workflows:
  capacitor-ios-android:
    name: Capacitor iOS & Android
    max_build_duration: 120
    instance_type: mac_mini_m1
    integrations:
      app_store_connect: Codemagic API
    environment:
      groups:
        # Añade tus variables de entorno aquí en Codemagic UI
        - capacitor_config
      vars:
        XCODE_WORKSPACE: "frontend/ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.mishuchas.app"
        APP_STORE_APP_ID: 1234567890  # Reemplazar con tu App ID
      node: 20
      xcode: 15.4
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: |
          cd frontend
          yarn install
      - name: Build web app
        script: |
          cd frontend
          yarn build
      - name: Update dependencies and copy web assets to native project
        script: |
          cd frontend
          npx cap sync
      - name: Set up keystore
        script: |
          echo $CM_KEYSTORE | base64 --decode > $CM_KEYSTORE_PATH
      - name: Build Android
        script: |
          cd frontend/android
          ./gradlew bundleRelease
      - name: Build iOS
        script: |
          cd frontend/ios/App
          pod install
          xcodebuild -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration "Release" \
            -archivePath "$CM_BUILD_DIR/App.xcarchive" \
            archive
          xcodebuild -exportArchive \
            -archivePath "$CM_BUILD_DIR/App.xcarchive" \
            -exportOptionsPlist frontend/ios/App/exportOptions.plist \
            -exportPath "$CM_BUILD_DIR"
    artifacts:
      - frontend/android/app/build/outputs/**/*.aab
      - frontend/android/app/build/outputs/**/*.apk
      - $CM_BUILD_DIR/*.ipa
    publishing:
      email:
        recipients:
          - tu-email@ejemplo.com
        notify:
          success: true
          failure: true
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Internal Testers
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
        submit_as_draft: true
